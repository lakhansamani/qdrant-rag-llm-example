services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-local-demo-qdrant
    ports:
      - "6333:6333" # REST API + built-in dashboard UI (http://localhost:6333/dashboard)
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Authorizer: self-hosted auth + embedded OpenFGA engine, used by the
  # fine-grained-permissions demo (scripts/fga_seed.py, scripts/fga_demo.py).
  # FGA needs Authorizer >= v2.3.0; override with AUTHORIZER_IMAGE if needed.
  # Demo-only credentials below.
  authorizer:
    image: ${AUTHORIZER_IMAGE:-quay.io/authorizer/authorizer:2.3.0}
    container_name: rag-local-demo-authorizer
    user: root
    ports:
      - "8080:8080" # GraphQL API + login app (/app) + admin dashboard (/dashboard)
    volumes:
      - authorizer_data:/authorizer/data
    command:
      - --database-type=sqlite
      - --database-url=/authorizer/data/data.db
      - --client-id=123456
      - --client-secret=secret
      - --admin-secret=admin
      - --jwt-type=HS256
      - --jwt-secret=test
      # The Gradio UI (:7860) calls Authorizer (:8080) from a different origin.
      # Authorizer's CSRF guard rejects cross-origin POSTs unless those origins
      # are explicitly allow-listed.
      - --allowed-origins=http://localhost:7860,http://localhost:8080
    restart: unless-stopped

volumes:
  authorizer_data:
